[pytest]
asyncio_mode = auto
testpaths = tests
markers =
    unit: lógica pura, sin I/O ni fixtures pesados (rápidos).
    integration: un componente/slice contra infra real local (Qdrant/DB/storage en
        memoria), sin pasar por HTTP.
    e2e: flujo completo por HTTP contra la app en proceso (LLM/embeddings falseados).
    pcai: E2E contra los endpoints REALES de PCAI (NIM). No corre en CI; requiere VPN,
        tokens vigentes y el stack levantado. Activar con: pytest -m pcai
