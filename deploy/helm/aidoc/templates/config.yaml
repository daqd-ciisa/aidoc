apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
data:
  REDIS_URL: "redis://{{ .Release.Name }}-redis:6379/0"
  QDRANT_URL: {{ .Values.config.qdrantUrl | quote }}
  QDRANT_COLLECTION: {{ .Values.config.qdrantCollection | quote }}
  S3_ENDPOINT_URL: "http://{{ .Release.Name }}-minio:9000"
  S3_BUCKET: {{ .Values.minio.bucket | quote }}
  S3_REGION: "us-east-1"
  LLM_URL: {{ .Values.config.llmUrl | quote }}
  LLM_MODEL: {{ .Values.config.llmModel | quote }}
  EMBEDDINGS_URL: {{ .Values.config.embeddingsUrl | quote }}
  EMBED_MODEL: {{ .Values.config.embedModel | quote }}
  EMBED_DIMENSIONS: {{ .Values.config.embedDimensions | quote }}
  VERIFY_SSL: {{ .Values.config.verifySsl | quote }}
  CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@{{ .Release.Name }}-postgres:5432/{{ .Values.postgres.db }}"
  S3_ACCESS_KEY: {{ .Values.minio.rootUser | quote }}
  S3_SECRET_KEY: {{ .Values.minio.rootPassword | quote }}
  QDRANT_API_KEY: {{ .Values.secrets.qdrantApiKey | quote }}
  LLM_API_KEY: {{ .Values.secrets.llmApiKey | quote }}
  EMBEDDINGS_API_KEY: {{ .Values.secrets.embeddingsApiKey | quote }}
  SECRET_KEY: {{ .Values.secrets.appSecretKey | quote }}
  SUPERADMIN_EMAIL: {{ .Values.secrets.superadminEmail | quote }}
  SUPERADMIN_PASSWORD: {{ .Values.secrets.superadminPassword | quote }}
