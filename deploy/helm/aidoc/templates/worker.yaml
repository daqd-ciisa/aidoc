apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-worker
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-worker
    spec:
      {{- include "aidoc.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z {{ .Release.Name }}-postgres 5432 && nc -z {{ .Release.Name }}-redis 6379; do echo esperando postgres/redis; sleep 2; done"]
      containers:
        - name: worker
          image: {{ include "aidoc.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["arq", "app.workers.main.WorkerSettings"]
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Release.Name }}-secret
          resources:
{{ toYaml .Values.worker.resources | indent 12 }}
