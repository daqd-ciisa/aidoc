services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aidoc
      POSTGRES_PASSWORD: aidoc
      POSTGRES_DB: aidoc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidoc"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aidoc
      MINIO_ROOT_PASSWORD: aidoc-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_started
    env_file:
      - .env
    environment:
      # Estos sobreescriben al .env (hostnames internos de la red docker).
      DATABASE_URL: postgresql+asyncpg://aidoc:aidoc@postgres:5432/aidoc
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_started
    env_file:
      - .env
    environment:
      # Estos sobreescriben al .env (hostnames internos de la red docker).
      DATABASE_URL: postgresql+asyncpg://aidoc:aidoc@postgres:5432/aidoc
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - ./backend:/app
    command: arq app.workers.main.WorkerSettings

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_PROXY: http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  pgdata:
  qdrantdata:
  miniodata:
