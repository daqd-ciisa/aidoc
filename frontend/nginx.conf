# Config nginx por defecto para la imagen de prod del frontend.
# Sirve el build estático de la SPA y hace reverse-proxy de /api al backend.
# En Kubernetes (PCAI) el Helm chart MONTA una versión de este archivo con el
# nombre de servicio correcto ({release}-backend); este default sirve para
# docker-compose de prod (upstream "backend").
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Documentos / propuestas pueden ser grandes.
    client_max_body_size 200m;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # SSE (streaming del chat): no bufferizar ni cachear.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA: cualquier ruta cae en index.html (react-router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
